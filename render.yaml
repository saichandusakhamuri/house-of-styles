services:
  - type: web
    name: house-of-styles-backend
    runtime: node
    plan: free
    rootDir: website/backend
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_ATLAS_URI
        sync: false # Set this in the Render Dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "10000"
      - key: CORS_ORIGIN
        sync: false # Set this to your Render Static Site URL

  - type: web
    name: house-of-styles-frontend
    runtime: static
    staticPublishPath: website
